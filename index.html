<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#080810">
<title>Mój Prywatny Claude</title>
<style>
:root {
  --bg: #080810;
  --s1: #10101c;
  --s2: #16162a;
  --s3: #1e1e35;
  --border: #2a2a45;
  --accent: #7c6af7;
  --accent2: #a594f9;
  --accent3: #c4b8ff;
  --text: #e8e8f4;
  --text2: #9090b8;
  --text3: #55556a;
  --green: #4caf82;
  --red: #e05555;
  --orange: #e0935a;
  --yellow: #e0c55a;
  --r: 12px;
  --rs: 7px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* TOP BAR */
#topbar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}
#topbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
#logo{font-size:18px;color:var(--accent2);font-weight:700;white-space:nowrap}
#session-status{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--text3);
  padding:3px 8px;background:var(--s2);
  border-radius:20px;border:1px solid var(--border);
  white-space:nowrap;
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.status-dot.active{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.warning{background:var(--orange)}

#topbar-controls{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

select, .tb-btn{
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);border-radius:var(--rs);
  font-size:12px;cursor:pointer;
  padding:5px 9px;
  transition:border-color .15s,background .15s;
  font-family:var(--font);
}
select:focus,select:hover,.tb-btn:hover{border-color:var(--accent);outline:none}
.tb-btn{display:flex;align-items:center;gap:5px}
.tb-btn:active{transform:scale(.97)}

#agent-select{max-width:180px}
#model-select{max-width:160px}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:240px;min-width:240px;
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transition:transform .25s;
}
#sidebar-top{padding:10px 8px 6px;border-bottom:1px solid var(--border)}
#new-chat{
  width:100%;padding:8px;
  background:var(--accent);color:#fff;
  border:none;border-radius:var(--rs);
  cursor:pointer;font-size:12.5px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s;
}
#new-chat:hover{background:var(--accent2)}

/* Folders */
#folder-area{flex:1;overflow-y:auto;padding:6px}
#folder-area::-webkit-scrollbar{width:4px}
#folder-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.folder-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 6px 4px;
  font-size:11px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.5px;
  cursor:pointer;
}
.folder-header:hover{color:var(--text2)}
.folder-name{display:flex;align-items:center;gap:5px}
.folder-arrow{transition:transform .2s;font-size:10px}
.folder-arrow.open{transform:rotate(90deg)}
.folder-convs{display:none}
.folder-convs.open{display:block}

.conv-item{
  display:flex;align-items:center;
  padding:7px 8px;border-radius:var(--rs);
  cursor:pointer;margin-bottom:1px;
  transition:background .1s;
  position:relative;
}
.conv-item:hover{background:var(--s2)}
.conv-item.active{background:var(--s3);border-left:2px solid var(--accent)}
.conv-item-text{flex:1;min-width:0}
.conv-title{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{font-size:10px;color:var(--text3);margin-top:1px}
.conv-actions{display:none;gap:2px}
.conv-item:hover .conv-actions{display:flex}
.conv-act-btn{
  background:none;border:none;color:var(--text3);
  cursor:pointer;padding:2px 4px;border-radius:4px;font-size:13px;
}
.conv-act-btn:hover{color:var(--red);background:rgba(224,85,85,.1)}

#sidebar-bottom{padding:10px 8px;border-top:1px solid var(--border)}
#api-key-wrap{margin-bottom:6px}
#api-key-wrap label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px}
#api-key{
  width:100%;padding:6px 8px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);
  font-size:11px;font-family:var(--mono);outline:none;
}
#api-key:focus{border-color:var(--accent)}
#api-status{font-size:10px;margin-top:3px;min-height:14px}
#cost-display{
  font-size:10px;color:var(--text3);
  padding:4px 6px;background:var(--s2);
  border-radius:var(--rs);border:1px solid var(--border);
  display:flex;justify-content:space-between;
}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Agent bar */
#agent-bar{
  display:none;
  padding:8px 16px;
  background:rgba(124,106,247,.08);
  border-bottom:1px solid rgba(124,106,247,.2);
  font-size:12px;color:var(--accent3);
  align-items:center;gap:8px;
}
#agent-bar.show{display:flex}
#agent-bar strong{color:var(--accent2)}
#agent-dismiss{
  margin-left:auto;background:none;border:none;
  color:var(--text3);cursor:pointer;font-size:16px;
}

/* Messages */
#messages{
  flex:1;overflow-y:auto;
  padding:20px 16px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
  /* Wiadomości zajmują cały dostępny obszar */
  min-height:0;
}
#messages::-webkit-scrollbar{width:5px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

#empty{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--text3);text-align:center;
}
#empty .e-icon{font-size:42px;margin-bottom:6px}
#empty h2{font-size:17px;color:var(--text2);font-weight:500}
#empty p{font-size:13px;max-width:320px;line-height:1.6}
/* Skróty nad polem */
.quick-btns{
  display:flex;flex-wrap:nowrap;gap:6px;
  overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none;
}
.quick-btns::-webkit-scrollbar{display:none}
.qb{
  padding:5px 11px;background:var(--s2);
  border:1px solid var(--border);border-radius:20px;
  font-size:11.5px;color:var(--text2);cursor:pointer;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.qb:hover{background:rgba(124,106,247,.1);border-color:var(--accent);color:var(--accent3)}

/* Wiadomości — pełna szerokość jak ChatGPT */
.msg{display:flex;flex-direction:column;width:100%;max-width:860px;margin:0 auto;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-items:flex-end}
.msg.assistant{align-items:flex-start}
.msg-label{font-size:10px;color:var(--text3);margin-bottom:3px;padding:0 4px;text-transform:uppercase;letter-spacing:.5px}
.bubble{
  padding:13px 17px;border-radius:var(--r);
  font-size:14px;line-height:1.75;word-break:break-word;
  border:1px solid var(--border);
  /* Bąbelki zajmują szerokość proporcjonalnie */
  max-width:88%;
}
.msg.user .bubble{
  background:var(--s2);border-bottom-right-radius:3px;
  max-width:75%;
}
.msg.assistant .bubble{
  background:var(--s1);border-bottom-left-radius:3px;
  max-width:100%;width:100%;
}
.bubble p{margin-bottom:7px}.bubble p:last-child{margin-bottom:0}
.bubble pre{background:#060610;border:1px solid var(--border);border-radius:var(--rs);padding:11px;overflow-x:auto;margin:9px 0;font-family:var(--mono);font-size:12px;line-height:1.5}
.bubble code{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.07);padding:2px 5px;border-radius:4px}
.bubble pre code{background:none;padding:0}
.bubble ul,.bubble ol{padding-left:18px;margin:5px 0}.bubble li{margin-bottom:3px}
.bubble strong{color:var(--accent3);font-weight:600}
.bubble h1,.bubble h2,.bubble h3{color:var(--accent2);margin:10px 0 5px}
.bubble a{color:var(--accent2)}
.bubble blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--text2);margin:6px 0}
.att-img{max-width:100%;max-height:180px;border-radius:var(--rs);display:block;margin-bottom:7px}
.att-file{display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(255,255,255,.04);border-radius:var(--rs);margin-bottom:7px;font-size:12px;color:var(--text2)}

/* Typing */
.typing{display:flex;gap:4px;padding:12px 15px;align-items:center}
.td{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* Input */
#input-wrap{
  padding:10px 14px 12px;
  border-top:1px solid var(--border);
  background:var(--s1);
}
#att-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.att-chip{
  display:flex;align-items:center;gap:5px;
  padding:3px 9px;background:var(--s2);
  border:1px solid var(--border);border-radius:20px;
  font-size:11px;color:var(--text2);
}
.att-chip button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0;line-height:1}
.att-chip button:hover{color:var(--red)}

/* Pole tekstowe — pełna szerokość */
#input-row{display:flex;flex-direction:column;gap:8px}
#msg-input{
  width:100%;background:var(--s2);
  border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-size:14px;font-family:var(--font);
  padding:13px 16px;resize:none;outline:none;
  min-height:56px;max-height:200px;line-height:1.65;
  transition:border-color .15s;
  display:block;
}
#msg-input:focus{border-color:var(--accent)}
#msg-input::placeholder{color:var(--text3);font-size:13px}

/* Przyciski pod polem */
#input-actions{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
#input-left{display:flex;gap:6px;align-items:center}
#file-btn{
  background:none;border:1px solid var(--border);
  color:var(--text2);cursor:pointer;
  padding:7px 12px;border-radius:var(--rs);
  font-size:15px;display:flex;align-items:center;gap:5px;
  transition:all .15s;font-size:13px;
}
#file-btn:hover{border-color:var(--accent);color:var(--accent2)}
#input-hint{font-size:10px;color:var(--text3)}
#send-btn{
  background:var(--accent);border:none;color:#fff;
  cursor:pointer;padding:9px 22px;border-radius:var(--rs);
  font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;
  transition:background .15s,transform .1s;
}
#send-btn:hover{background:var(--accent2)}
#send-btn:active{transform:scale(.97)}
#send-btn:disabled{background:var(--s3);color:var(--text3);cursor:not-allowed;transform:none}

/* Modals */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.modal{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);padding:24px;
  width:100%;max-width:500px;max-height:80vh;
  overflow-y:auto;
}
.modal h3{font-size:16px;margin-bottom:16px;color:var(--accent2)}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:10px}
.modal input,.modal textarea,.modal select{
  width:100%;padding:8px 10px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);
  font-size:13px;font-family:var(--font);outline:none;
}
.modal textarea{resize:vertical;min-height:80px}
.modal input:focus,.modal textarea:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.btn-primary{
  padding:8px 18px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--rs);cursor:pointer;font-size:13px;
  transition:background .15s;
}
.btn-primary:hover{background:var(--accent2)}
.btn-sec{
  padding:8px 18px;background:var(--s2);color:var(--text2);
  border:1px solid var(--border);border-radius:var(--rs);
  cursor:pointer;font-size:13px;transition:all .15s;
}
.btn-sec:hover{border-color:var(--accent);color:var(--text)}

/* Export menu */
#export-menu{
  position:absolute;right:0;top:100%;margin-top:4px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--rs);padding:4px;
  z-index:50;display:none;min-width:150px;
}
#export-menu.show{display:block}
.export-opt{
  display:block;width:100%;text-align:left;
  padding:7px 12px;background:none;border:none;
  color:var(--text);font-size:12.5px;cursor:pointer;
  border-radius:4px;transition:background .1s;
}
.export-opt:hover{background:var(--s3)}
#export-wrap{position:relative}

/* Toast */
#toast{
  position:fixed;bottom:70px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--s2);border:1px solid var(--border);
  color:var(--text);padding:9px 16px;border-radius:20px;
  font-size:12.5px;opacity:0;transition:all .2s;
  pointer-events:none;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Agent list in modal */
.agent-list-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;background:var(--s2);border-radius:var(--rs);
  margin-bottom:5px;border:1px solid var(--border);
}
.agent-list-item .agent-info{flex:1}
.agent-list-item .agent-name{font-size:13px;color:var(--text)}
.agent-list-item .agent-desc{font-size:11px;color:var(--text3);margin-top:1px}
.agent-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:2px 6px}
.agent-del:hover{color:var(--red)}

/* Mobile */
#sidebar-toggle{
  display:none;background:none;border:none;
  color:var(--text2);cursor:pointer;font-size:20px;padding:4px 8px;
}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
#overlay.show{display:block}

@media(max-width:640px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sidebar-toggle{display:flex;align-items:center}
  .msg{max-width:95%}
  #topbar-controls{gap:4px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-left">
    <button id="sidebar-toggle">☰</button>
    <span id="logo">⬡ Claude Prywatny</span>
    <div id="session-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Brak sesji</span>
    </div>
  </div>
  <div id="topbar-controls">
    <select id="model-select" title="Wybierz model AI">
      <option value="claude">Claude Sonnet 4.6</option>
      <option value="claude-opus">Claude Opus 4</option>
      <option value="gemini">Gemini 1.5 Pro</option>
      <option value="grok">Grok 2</option>
    </select>
    <select id="agent-select" title="Wybierz agenta">
      <option value="">— Bez agenta —</option>
    </select>
    <button class="tb-btn" onclick="openAgentManager()">🤖 Agenci</button>
    <div id="export-wrap">
      <button class="tb-btn" onclick="toggleExportMenu()">💾 Eksport ▾</button>
      <div id="export-menu">
        <button class="export-opt" onclick="exportConv('txt')">📄 Eksport TXT</button>
        <button class="export-opt" onclick="exportConv('html')">🌐 Eksport HTML</button>
        <button class="export-opt" onclick="exportConv('json')">📦 Eksport JSON</button>
      </div>
    </div>
    <button class="tb-btn" onclick="clearChat()">🗑 Wyczyść</button>
  </div>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- LAYOUT -->
<div id="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-top">
      <button id="new-chat" onclick="newConversation()">＋ Nowa rozmowa</button>
    </div>

    <div id="folder-area">
      <!-- filled by JS -->
    </div>

    <div id="sidebar-bottom">
      <div id="api-key-wrap">
        <label>Klucz API (Claude / Gemini / Grok)</label>
        <input type="password" id="api-key" placeholder="sk-ant-... lub AIza... lub xai-..." autocomplete="off">
        <div id="api-status"></div>
      </div>
      <div id="cost-display">
        <span>Tokeny sesji:</span>
        <span id="token-count">0</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="agent-bar">
      <span>🤖 Agent: <strong id="agent-bar-name"></strong> — <span id="agent-bar-role"></span></span>
      <button id="agent-dismiss" onclick="dismissAgent()">✕</button>
    </div>

    <div id="messages">
      <div id="empty">
        <div class="e-icon">⬡</div>
        <h2>Mój Prywatny Claude</h2>
        <p>Rozmowy zapisywane lokalnie. Dane nie trafiają do treningu modelu.</p>
      </div>
    </div>

    <div id="input-wrap">
      <!-- Skróty nad polem — widoczne tylko gdy brak wiadomości -->
      <div id="quick-bar" class="quick-btns" style="margin-bottom:8px;justify-content:flex-start">
        <div class="qb" onclick="usePrompt('Wyjaśnij mi jak działa ')">💡 Wyjaśnij</div>
        <div class="qb" onclick="usePrompt('Popraw ten tekst: ')">✏️ Popraw</div>
        <div class="qb" onclick="usePrompt('Przetłumacz na angielski: ')">🌍 Tłumacz</div>
        <div class="qb" onclick="usePrompt('Napisz kod który ')">💻 Kod</div>
        <div class="qb" onclick="usePrompt('Podsumuj w punktach: ')">📋 Podsumuj</div>
        <div class="qb" onclick="usePrompt('Przeanalizuj i oceń: ')">🔍 Analiza</div>
      </div>

      <div id="att-bar"></div>

      <div id="input-row">
        <textarea id="msg-input" placeholder="Napisz wiadomość… (Enter = wyślij, Shift+Enter = nowa linia)" rows="1"></textarea>
        <div id="input-actions">
          <div id="input-left">
            <button id="file-btn" title="Dodaj plik / zdjęcie" onclick="document.getElementById('file-input').click()">📎 Plik</button>
            <span id="input-hint">Wklej zdjęcie: Ctrl+V</span>
          </div>
          <button id="send-btn">Wyślij ➤</button>
        </div>
      </div>
      <div style="text-align:right;font-size:10px;color:var(--text3);margin-top:2px"><span id="char-count"></span></div>
    </div>
  </main>
</div>

<!-- MODALS -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal-box">
    <!-- filled dynamically -->
  </div>
</div>

<div id="toast"></div>
<input type="file" id="file-input" style="display:none" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.py,.js,.html,.css,.xml,.log">

<script>
// =====================================================
// AGENTS
// =====================================================
const DEFAULT_AGENTS = [

const S = {
  apiKey: '',
  model: 'claude',
  conversations: {},
  folders: {},
  currentId: null,
  attachments: [],
  isLoading: false,
  agents: [...DEFAULT_AGENTS],
  currentAgent: null,
  sessionTokens: 0,
  pingInterval: null,
  lastActivity: Date.now(),
};

const STORAGE_KEY = 'moj_claude_v3';
const MODEL_MAP = {
  claude: 'claude-sonnet-4-6',
  'claude-opus': 'claude-opus-4-6',
  gemini: 'gemini-1.5-pro',
  grok: 'grok-2-latest',
};

// =====================================================
// STORAGE
// =====================================================
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      conversations: S.conversations,
      folders: S.folders,
      currentId: S.currentId,
      apiKey: S.apiKey,
      model: S.model,
      agents: S.agents.filter(a => !DEFAULT_AGENTS.find(d => d.id === a.id)),
    }));
  } catch(e) { toast('⚠️ Błąd zapisu — wyczyść starsze rozmowy'); }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    S.conversations = d.conversations || {};
    S.folders = d.folders || {};
    S.currentId = d.currentId || null;
    S.apiKey = d.apiKey || '';
    S.model = d.model || 'claude';
    const custom = d.agents || [];
    S.agents = [...DEFAULT_AGENTS, ...custom];
  } catch(e) { console.warn('Błąd ładowania'); }
}

// =====================================================
// SESSION KEEP-ALIVE (Prompt Caching simulation)
// =====================================================
function startSessionPing() {
  if (S.pingInterval) clearInterval(S.pingInterval);
  setStatus('active', 'Sesja aktywna');

  // Ping co 4 minuty — podtrzymuje cache Anthropic (wygasa po 5 min)
  S.pingInterval = setInterval(async () => {
    const conv = currentConv();
    if (!conv || !conv.messages.length || !S.apiKey) return;

    const idle = (Date.now() - S.lastActivity) / 1000 / 60;
    if (idle > 60) {
      // Ponad godzina bezczynności — zatrzymaj ping
      stopSessionPing();
      return;
    }

    setStatus('warning', `Podtrzymuję sesję… (${Math.round(idle)}m bezczynności)`);

    try {
      // Minimalny ping — tylko 1 token żeby odświeżyć cache
      await callClaude([
        ...buildApiMessages(conv.messages),
        { role: 'user', content: '.' }
      ], S.apiKey, 1);
      setStatus('active', 'Sesja aktywna');
    } catch(e) {
      setStatus('warning', 'Ping nieudany');
    }
  }, 4 * 60 * 1000); // 4 minuty
}

function stopSessionPing() {
  if (S.pingInterval) { clearInterval(S.pingInterval); S.pingInterval = null; }
  setStatus('', 'Brak sesji');
}

function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot' + (type ? ' ' + type : '');
  txt.textContent = text;
}

// =====================================================
// CONVERSATIONS & FOLDERS
// =====================================================
function newConversation(folderId = null) {
  const id = 'c_' + Date.now();
  S.conversations[id] = {
    id, title: 'Nowa rozmowa',
    messages: [], folderId: folderId || 'default',
    created: Date.now(),
  };
  if (!S.folders['default']) {
    S.folders['default'] = { id: 'default', name: '📁 Ogólne', open: true };
  }
  if (folderId && !S.folders[folderId]) {
    S.folders[folderId] = { id: folderId, name: '📁 Folder', open: true };
  }
  S.currentId = id;
  S.attachments = [];
  save();
  renderSidebar();
  renderMessages();
  setTitle('Nowa rozmowa');
  closeSidebar();
}

function currentConv() {
  return S.currentId ? S.conversations[S.currentId] : null;
}

function switchConv(id) {
  S.currentId = id;
  save();
  renderSidebar();
  renderMessages();
  setTitle(S.conversations[id]?.title || 'Rozmowa');
  closeSidebar();
}

function deleteConv(id, e) {
  e?.stopPropagation();
  if (!confirm('Usunąć tę rozmowę?')) return;
  delete S.conversations[id];
  if (S.currentId === id) {
    const ids = Object.keys(S.conversations);
    S.currentId = ids.length ? ids[ids.length - 1] : null;
  }
  save();
  renderSidebar();
  renderMessages();
}

function createFolder() {
  const name = prompt('Nazwa folderu:');
  if (!name?.trim()) return;
  const id = 'f_' + Date.now();
  S.folders[id] = { id, name: '📁 ' + name.trim(), open: true };
  save();
  renderSidebar();
  newConversation(id);
}

function toggleFolder(id) {
  if (S.folders[id]) {
    S.folders[id].open = !S.folders[id].open;
    save();
    renderSidebar();
  }
}

function renderSidebar() {
  const area = document.getElementById('folder-area');

  // Ensure default folder
  if (!S.folders['default']) {
    S.folders['default'] = { id: 'default', name: '📁 Ogólne', open: true };
  }

  const allConvs = Object.values(S.conversations).sort((a,b) => b.created - a.created);

  let html = '';

  // New folder button
  html += `<div style="padding:4px 6px 8px">
    <button class="tb-btn" style="width:100%;justify-content:center;font-size:11px" onclick="createFolder()">＋ Nowy folder</button>
  </div>`;

  // Folders
  const folders = Object.values(S.folders).sort((a,b) => a.id === 'default' ? -1 : 1);

  for (const folder of folders) {
    const convs = allConvs.filter(c => c.folderId === folder.id);
    const isOpen = folder.open !== false;

    html += `<div>
      <div class="folder-header" onclick="toggleFolder('${folder.id}')">
        <span class="folder-name">
          <span class="folder-arrow ${isOpen ? 'open' : ''}">▶</span>
          ${escH(folder.name)}
          <span style="color:var(--text3);font-size:10px">(${convs.length})</span>
        </span>
        ${folder.id !== 'default' ? `<button onclick="deleteFolder('${folder.id}',event)" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px" title="Usuń folder">✕</button>` : ''}
      </div>
      <div class="folder-convs ${isOpen ? 'open' : ''}">
        ${convs.map(c => `
          <div class="conv-item ${c.id === S.currentId ? 'active' : ''}" onclick="switchConv('${c.id}')">
            <div class="conv-item-text">
              <div class="conv-title">${escH(c.title)}</div>
              <div class="conv-meta">${fmtDate(c.created)} · ${c.messages.length} wiad.</div>
            </div>
            <div class="conv-actions">
              <button class="conv-act-btn" onclick="moveConv('${c.id}',event)" title="Przenieś">↗</button>
              <button class="conv-act-btn" onclick="deleteConv('${c.id}',event)" title="Usuń">✕</button>
            </div>
          </div>`).join('')}
        <div style="padding:2px 4px 4px">
          <button class="tb-btn" style="font-size:10px;width:100%;justify-content:center" onclick="newConversation('${folder.id}')">＋ tu</button>
        </div>
      </div>
    </div>`;
  }

  if (!allConvs.length) {
    html += '<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">Brak rozmów</div>';
  }

  area.innerHTML = html;
}

function deleteFolder(id, e) {
  e?.stopPropagation();
  const convs = Object.values(S.conversations).filter(c => c.folderId === id);
  if (convs.length && !confirm(`Folder zawiera ${convs.length} rozmów. Usunąć razem z rozmowami?`)) return;
  convs.forEach(c => delete S.conversations[c.id]);
  delete S.folders[id];
  if (convs.some(c => c.id === S.currentId)) S.currentId = null;
  save();
  renderSidebar();
  renderMessages();
}

function moveConv(id, e) {
  e?.stopPropagation();
  const folderNames = Object.values(S.folders).map(f => f.name.replace('📁 ','')).join('\n');
  const name = prompt('Przenieś do folderu (wpisz nazwę lub zostaw pustą dla Ogólne):\n\n' + folderNames);
  if (name === null) return;
  const folder = Object.values(S.folders).find(f => f.name.toLowerCase().includes(name.toLowerCase()));
  S.conversations[id].folderId = folder ? folder.id : 'default';
  save();
  renderSidebar();
}

function renderMsg(msg) {
  const isUser = msg.role === 'user';
  let inner = '';

  if (msg.attachments?.length) {
    msg.attachments.forEach(a => {
      if (a.type === 'image') inner += `<img class="att-img" src="${a.data}" alt="${escH(a.name)}">`;
      else inner += `<div class="att-file">📄 ${escH(a.name)} <span style="color:var(--text3)">(${fmtSize(a.size)})</span></div>`;
    });
  }

  inner += isUser
    ? escH(msg.text||'').replace(/\n/g,'<br>')
    : fmtMd(msg.text||'');

  return `<div class="msg ${msg.role}">
    <div class="msg-label">${isUser ? 'Ty' : (S.currentAgent ? S.currentAgent.name : 'Claude')}</div>
    <div class="bubble">${inner}</div>
  </div>`;
}

    <div class="bubble"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;

// =====================================================
// MARKDOWN
// =====================================================
function fmtMd(t) {
  let h = escH(t);
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${c.trim()}</code></pre>`);
  h = h.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^\- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>[\s\S]+?<\/li>)/g, '<ul>$1</ul>');
  h = h.split(/\n\n+/).map(p => {
    if (/^<(h[123]|pre|ul|blockquote)/.test(p)) return p;
    return '<p>' + p.replace(/\n/g,'<br>') + '</p>';
  }).join('');
  return h;
}

function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(ts) {
  const d = new Date(ts), n = new Date();
  return d.toDateString()===n.toDateString()
    ? d.toLocaleTimeString('pl',{hour:'2-digit',minute:'2-digit'})
    : d.toLocaleDateString('pl',{day:'2-digit',month:'2-digit'});
}

function fmtSize(b) {
  if (!b) return '';
  if (b < 1024) return b+'B';
  if (b < 1048576) return (b/1024).toFixed(1)+'KB';
  return (b/1048576).toFixed(1)+'MB';
}

// =====================================================
// SEND MESSAGE
// =====================================================
async function sendMessage() {
  if (S.isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !S.attachments.length) return;

  if (!S.apiKey) { toast('⚠️ Wpisz klucz API w lewym panelu'); return; }
  if (!S.currentId) newConversation();

  S.lastActivity = Date.now();

  const conv = currentConv();
  const userMsg = { role:'user', text, attachments:[...S.attachments], timestamp:Date.now() };
  conv.messages.push(userMsg);

  if (conv.messages.length === 1) {
    conv.title = (text||S.attachments[0]?.name||'Rozmowa').slice(0,45);
    setTitle(conv.title);
  }

  S.attachments = [];
  renderAttachments();
  input.value = ''; input.style.height='auto';
  document.getElementById('char-count').textContent = '';

  renderMessages();
  addTyping();
  S.isLoading = true;
  document.getElementById('send-btn').disabled = true;

  try {
    let reply = '';
    const model = S.model;

    if (model === 'claude' || model === 'claude-opus') {
      const apiMsgs = buildApiMessages(conv.messages);
      const systemPrompt = S.currentAgent ? S.currentAgent.prompt : undefined;
      reply = await callClaude(apiMsgs, S.apiKey, 4096, systemPrompt);
    } else if (model === 'gemini') {
      reply = await callGemini(conv.messages, S.apiKey);
    } else if (model === 'grok') {
      reply = await callGrok(conv.messages, S.apiKey);
    }

    removeTyping();
    conv.messages.push({ role:'assistant', text:reply, timestamp:Date.now() });

    // Estimate tokens (rough: 4 chars = 1 token)
    S.sessionTokens += Math.ceil((text.length + reply.length) / 4);
    document.getElementById('token-count').textContent = S.sessionTokens.toLocaleString();

    save();
    renderSidebar();
    renderMessages();

    // Start keep-alive after first message
    if (conv.messages.length === 2) startSessionPing();

  } catch(err) {
    removeTyping();
    let e = '❌ ' + err.message;
    if (err.message.includes('401')) e = '❌ Nieprawidłowy klucz API';
    if (err.message.includes('429')) e = '❌ Limit zapytań — poczekaj chwilę';
    if (err.message.includes('529')) e = '❌ Serwery przeciążone — spróbuj za chwilę';
    conv.messages.push({ role:'assistant', text:e, timestamp:Date.now() });
    save();
    renderMessages();
  }

  S.isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// =====================================================
// API CALLS
// =====================================================
function buildApiMessages(messages) {
  return messages.map(msg => {
    if (msg.role === 'assistant') return { role:'assistant', content: msg.text };
    const content = [];
    msg.attachments?.forEach(a => {
      if (a.type === 'image') {
        content.push({ type:'image', source:{ type:'base64', media_type:a.mediaType, data:a.data.split(',')[1] }});
      } else {
        content.push({ type:'text', text:`[Plik: ${a.name}]\n\`\`\`\n${a.data}\n\`\`\`` });
      }
    });
    if (msg.text) content.push({ type:'text', text: msg.text });
    return { role:'user', content: content.length===1&&content[0].type==='text' ? content[0].text : content };
  });
}

async function callClaude(messages, apiKey, maxTokens=4096, systemPrompt=null) {
  const body = {
    model: MODEL_MAP[S.model] || 'claude-sonnet-4-6',
    max_tokens: maxTokens,
    messages,
  };

  // Prompt caching — cache system prompt i pierwsze wiadomości
  if (systemPrompt) {
    body.system = [{
      type: 'text', text: systemPrompt,
      cache_control: { type: 'ephemeral' }
    }];
  }

  // Cache pierwsze wiadomości jeśli rozmowa długa
  if (messages.length > 4) {
    const cached = JSON.parse(JSON.stringify(messages));
    const lastTwo = cached.splice(-2);
    if (cached.length && cached[cached.length-1].role === 'user') {
      const last = cached[cached.length-1];
      if (typeof last.content === 'string') {
        last.content = [{ type:'text', text:last.content, cache_control:{ type:'ephemeral' }}];
      }
    }
    body.messages = [...cached, ...lastTwo];
  }

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-beta':'prompt-caching-2024-07-31',
      'anthropic-dangerous-direct-browser-calls':'true',
    },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.content?.[0]?.text || '';
}

async function callGemini(messages, apiKey) {
  // Gemini API — wymaga osobnego klucza (AIza...)
  const contents = messages.map(m => ({
    role: m.role === 'user' ? 'user' : 'model',
    parts: [{ text: m.text || '' }]
  }));

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`,
    {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents }),
    }
  );

  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || `Gemini HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function callGrok(messages, apiKey) {
  // Grok API (xAI) — kompatybilne z OpenAI
  const res = await fetch('https://api.x.ai/v1/chat/completions', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: 'grok-2-latest',
      messages: messages.map(m => ({ role:m.role, content:m.text||'' })),
      max_tokens: 4096,
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || `Grok HTTP ${res.status}`);
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

// =====================================================
// FILES
// =====================================================
document.getElementById('file-input').onchange = async (e) => {
  for (const f of Array.from(e.target.files)) await processFile(f);
  e.target.value = '';
};

async function processFile(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    const isImg = file.type.startsWith('image/');
    r.onload = e => {
      S.attachments.push({
        name:file.name, type:isImg?'image':'text',
        mediaType:file.type||'text/plain',
        data:e.target.result, size:file.size,
      });
      renderAttachments();
      resolve();
    };
    isImg ? r.readAsDataURL(file) : r.readAsText(file);
  });
}

function renderAttachments() {
  document.getElementById('att-bar').innerHTML = S.attachments.map((a,i) => `
    <div class="att-chip">
      <span>${a.type==='image'?'🖼':'📄'}</span>
      <span>${escH(a.name)}</span>
      <button onclick="S.attachments.splice(${i},1);renderAttachments()">✕</button>
    </div>`).join('');
}

// =====================================================
// EXPORT
// =====================================================
function toggleExportMenu() {
  document.getElementById('export-menu').classList.toggle('show');
}

document.addEventListener('click', e => {
  if (!e.target.closest('#export-wrap')) {
    document.getElementById('export-menu').classList.remove('show');
  }
});

function exportConv(fmt) {
  document.getElementById('export-menu').classList.remove('show');
  const conv = currentConv();
  if (!conv?.messages.length) { toast('⚠️ Brak wiadomości do eksportu'); return; }

  const date = new Date().toLocaleDateString('pl');
  const fname = `rozmowa_${date.replace(/\./g,'-')}`;

  if (fmt === 'json') {
    dl(fname+'.json', JSON.stringify(conv, null, 2), 'application/json');
  } else if (fmt === 'txt') {
    const txt = conv.messages.map(m =>
      `[${m.role === 'user' ? 'TY' : 'CLAUDE'}] ${new Date(m.timestamp).toLocaleString('pl')}\n${m.text||''}\n`
    ).join('\n---\n\n');
    dl(fname+'.txt', txt, 'text/plain');
  } else if (fmt === 'html') {
    const rows = conv.messages.map(m => `
      <div class="msg ${m.role}">
        <div class="label">${m.role==='user'?'Ty':'Claude'} — ${new Date(m.timestamp).toLocaleString('pl')}</div>
        <div class="bubble">${m.role==='user' ? escH(m.text||'').replace(/\n/g,'<br>') : fmtMd(m.text||'')}</div>
      </div>`).join('');
    const html = `<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><title>${escH(conv.title)}</title>
      <style>body{font-family:system-ui;max-width:800px;margin:40px auto;padding:20px;background:#f5f5f5;color:#222}
      .msg{margin:16px 0}.user{text-align:right}.label{font-size:11px;color:#888;margin-bottom:4px}
      .bubble{display:inline-block;padding:12px 16px;border-radius:12px;max-width:80%;text-align:left;line-height:1.6}
      .user .bubble{background:#e3e0ff}.assistant .bubble{background:#fff;border:1px solid #ddd}
      pre{background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;overflow-x:auto}
      code{background:#eee;padding:2px 5px;border-radius:4px}</style>
      </head><body><h1>${escH(conv.title)}</h1><p style="color:#888">Eksport: ${new Date().toLocaleString('pl')}</p>
      ${rows}</body></html>`;
    dl(fname+'.html', html, 'text/html');
  }
  toast('✅ Eksport gotowy');
}

function dl(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type}));
  a.download = name; a.click();
}

// =====================================================
// UI HELPERS
// =====================================================
function clearChat() {
  const conv = currentConv();
  if (!conv?.messages.length) return;
  if (!confirm('Wyczyścić rozmowę?')) return;
  conv.messages = []; conv.title = 'Nowa rozmowa';
  setTitle('Nowa rozmowa');
  S.sessionTokens = 0;
  document.getElementById('token-count').textContent = '0';
  stopSessionPing();
  save(); renderSidebar(); renderMessages();
}

function setTitle(t) { document.getElementById('chat-title') && (document.getElementById('chat-title').textContent = t); }

function usePrompt(t) {
  const i = document.getElementById('msg-input');
  i.value = t; i.focus(); autoResize(i);
}

function toast(msg, ms=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function showModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function closeModalOnBg(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200)+"px";
}

// =====================================================
// EVENT LISTENERS
// =====================================================
document.getElementById('send-btn').onclick = sendMessage;

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('msg-input').addEventListener('input', function() {
  autoResize(this);
  const l = this.value.length;
  document.getElementById('char-count').textContent = l > 80 ? l+' zn.' : '';
});

document.getElementById('api-key').addEventListener('input', function() {
  S.apiKey = this.value.trim();
  save();
  const st = document.getElementById('api-status');
  if (S.apiKey.startsWith('sk-ant-')) { st.textContent='✅ Claude API'; st.style.color='var(--green)'; }
  else if (S.apiKey.startsWith('AIza')) { st.textContent='✅ Gemini API'; st.style.color='var(--green)'; }
  else if (S.apiKey.startsWith('xai-')) { st.textContent='✅ Grok API'; st.style.color='var(--green)'; }
  else if (S.apiKey.length > 5) { st.textContent='⚠️ Sprawdź klucz'; st.style.color='var(--orange)'; }
  else { st.textContent=''; }
});

document.getElementById('model-select').onchange = function() {
  S.model = this.value; save();
  toast(`Model: ${this.options[this.selectedIndex].text}`);
};

document.getElementById('agent-select').onchange = function() { applyAgent(this.value); };

document.getElementById('sidebar-toggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
};

// Drag & drop
document.getElementById('messages').addEventListener('dragover', e => e.preventDefault());
document.getElementById('messages').addEventListener('drop', async e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files);
  for (const f of files) await processFile(f);
  toast(`📎 Dodano ${files.length} plik(ów)`);
});

// Paste image
document.addEventListener('paste', async e => {
  const img = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
  if (img) { await processFile(img.getAsFile()); toast('🖼 Wklejono zdjęcie'); }
});

// Activity tracking
document.addEventListener('keydown', () => S.lastActivity = Date.now());
document.addEventListener('click', () => S.lastActivity = Date.now());

// =====================================================
// INIT
// =====================================================
load();

if (S.apiKey) {
  document.getElementById('api-key').value = S.apiKey;
  document.getElementById('api-key').dispatchEvent(new Event('input'));
}

document.getElementById('model-select').value = S.model || 'claude';
renderAgentSelect();

if (S.currentId && S.conversations[S.currentId]) {
  renderSidebar();
  renderMessages();
} else {
  const ids = Object.keys(S.conversations).sort((a,b) => (S.conversations[b].created||0)-(S.conversations[a].created||0));
  if (ids.length) { S.currentId = ids[0]; renderSidebar(); renderMessages(); }
  else newConversation();
}

// Podtrzymaj sesję jeśli była aktywna rozmowa
if (currentConv()?.messages.length > 1) {
  startSessionPing();
}
</script>
